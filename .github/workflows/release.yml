name: 🚀 Version & Release

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  versioning:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # Setup Node (only needed for version + test)
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Detect branch
      - name: 🌿 Detect branch
        id: branch
        run: echo "BRANCH=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      # Install deps ONLY for main (for testing)
      - name: 📦 Install deps
        if: steps.branch.outputs.BRANCH == 'main'
        run: npm install

      # Run tests ONLY for main
      - name: 🧪 Run tests
        if: steps.branch.outputs.BRANCH == 'main'
        run: npm test

      # Version bump logic
      - name: 🔖 Bump version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          if [ "${{ steps.branch.outputs.BRANCH }}" = "main" ]; then
            # 🔥 MAIN → minor
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            # 🔥 FEATURE → patch
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "New version: $NEW_VERSION"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      # Commit version
      - name: 📝 Commit version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "chore(version): v${{ steps.version.outputs.VERSION }} [skip ci]" || echo "No changes"

      # Push commit
      - name: 🚀 Push
        run: git push origin ${{ steps.branch.outputs.BRANCH }}

      # Tag (ONLY main)
      - name: 🔖 Tag
        if: steps.branch.outputs.BRANCH == 'main'
        run: |
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin v${{ steps.version.outputs.VERSION }}

      # Release (ONLY main)
      - name: 📦 Release
        if: steps.branch.outputs.BRANCH == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
