name: 🚀 Release (Main)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-and-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # Setup Node
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install deps
      - name: 📦 Install deps
        run: npm install

      # Prepare SQLite DB (reuse if exists, else create)
      - name: 🗄️ Prepare SQLite DB
        id: db
        run: |
          if [ -f db.sqlite ]; then
            echo "db.sqlite already exists — reusing."
            echo "CREATED=false" >> $GITHUB_OUTPUT
          else
            echo "db.sqlite not found — creating via cds deploy."
            npx cds deploy --to sqlite:db.sqlite
            echo "CREATED=true" >> $GITHUB_OUTPUT
          fi

      # Run tests
      - name: 🧪 Run tests
        run: npm test

      # Cleanup SQLite DB (only if CI created it)
      - name: 🧹 Cleanup SQLite DB
        if: steps.db.outputs.CREATED == 'true'
        run: rm -f db.sqlite

      # Version bump (minor for main)
      - name: 🔖 Bump version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)

          NEW_VERSION="$MAJOR.$((MINOR + 1)).0"

          echo "New version: $NEW_VERSION"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      # Commit version
      - name: 📝 Commit version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "chore(version): v${{ steps.version.outputs.VERSION }} [skip ci]" || echo "No changes"

      # Push commit
      - name: 🚀 Push
        run: git push origin main

      # Tag
      - name: 🔖 Tag
        run: |
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin v${{ steps.version.outputs.VERSION }}

      # Release
      - name: 📦 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
